# Pre-production override for local testing with GHCR images
# Usage: docker compose -f docker-compose.yml -f docker-compose.preprod.yml up -d

services:
  pgadmin:
    environment:
      - DOMAIN_NAME=pgadmin.card-vault.preprod
  redisinsight:
    environment:
      - DOMAIN_NAME=redisinsight.card-vault.preprod
  proxy:
    environment:
      - DOMAIN_NAME=card-vault.preprod
    volumes:
      - ./proxy/default.preprod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
