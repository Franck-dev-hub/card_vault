# Global settings
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_status 429;
server_tokens off;

# HTTP to HTTPS redirection
server {
    listen 80;
    server_name card-vault.fr www.card-vault.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    listen 443 quic reuseport;
    server_name card-vault.fr www.card-vault.fr;

    # Security Headers
    add_header Alt-Svc 'h3=":443"; ma=86400';
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' card-vault.fr; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.pokemontcg.io https://assets.tcgdex.net; frame-ancestors 'none';" always;

    # SSL Config
    ssl_certificate /etc/letsencrypt/live/card-vault.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/card-vault.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Endpoints
    location /api/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /ml/ {
        proxy_pass http://ml_service:5000;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
