name: Build and Push to GHCR

on:
  push:
    branches:
      - prod
      - preprod
    tags:
      - "v*"
  pull_request:
    branches:
      - prod

# Allow GHCR push
permissions:
  contents: read
  packages: write
  deployments: write

jobs:
  build-and-push:
    name: Build and Push Docker Images to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker config for GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      - name: Docker meta for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=preprod,enable=${{ github.ref == 'refs/heads/preprod' }}

      # Build & push backed image
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      # Docker meta for frontend
      - name: Docker meta for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=preprod,enable=${{ github.ref == 'refs/heads/preprod' }}

      # Build & push frontend image
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      # Docker meta for ml_service
      - name: Docker meta for ml_service
        id: meta-ml
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/ml-service
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=preprod,enable=${{ github.ref == 'refs/heads/preprod' }}

      # Build & push ml_service image
      - name: Build and push ml_service
        uses: docker/build-push-action@v5
        with:
          context: ./ml_service
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ml.outputs.tags }}
          labels: ${{ steps.meta-ml.outputs.labels }}

      # Docker meta for proxy
      - name: Docker meta for proxy
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/proxy
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=preprod,enable=${{ github.ref == 'refs/heads/preprod' }}

      # Build & push proxy image
      - name: Build and push proxy
        uses: docker/build-push-action@v5
        with:
          context: ./proxy
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}

      # Create deployment on GitHub for tracability
      - name: Create GitHub Deployment
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: `Built and pushed images to GHCR: backend, frontend, ml-service, proxy (${{ github.sha }})`,
              transient_environment: false
            });

            // Mettre à jour le statut en success
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'production',
              environment_url: 'https://card-vault.franck-dev-hub.com',
              description: 'Images built and pushed to GHCR successfully'
            });
