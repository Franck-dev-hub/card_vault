name: Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deployment:
    runs-on: ubuntu-latest
    environment: prod
    concurrency: prod

    steps:
      - name: Create GitHub Deployment (Pending)
        uses: actions/github-script@v7
        id: deployment
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: `Deploying from ${context.ref} (${context.sha})`,
              transient_environment: false
            });
            core.setOutput('deployment_id', deployment.data.id);
            return deployment.data.id;

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH (Pull from GHCR)
        id: deploy-ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
            cd ~/Server/card_vault
            git remote set-url origin https://github.com/Franck-dev-hub/card_vault.git
            git pull origin main
            
            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images from GHCR
            docker compose pull
            
            # Start containers (no build needed, images are from GHCR)
            docker compose up -d
            
            # Verify services are running
            docker compose ps
            
            # Clean up old images
            docker system prune -f

      - name: Update Deployment Status (Success)
        if: success() && steps.deploy-ssh.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'success',
              environment: 'production',
              environment_url: 'https://card-vault.franck-dev-hub.com',
              description: 'Successfully deployed from GHCR'
            });

      - name: Update Deployment Status (Failure)
        if: failure() || steps.deploy-ssh.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'failure',
              environment: 'production',
              description: 'Deployment failed. Check logs.'
            });
